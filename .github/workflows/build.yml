name: Build CRM App

on:
  push:
    tags:
      - "v*"   # 只有 push tag 才触发发布
  workflow_dispatch: {}  # 手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app
        run: npx electron-builder --mac --arm64 --x64

      - name: Upload mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/**/*.{dmg,app}

      - name: Create GitHub Release (mac)
        uses: ncipollo/release-action@v2
        with:
          artifacts: dist/**/*.{dmg,app}
          tag: ${{ github.ref_name }}

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build Windows app
        run: npx electron-builder --win --x64 --ia32

      - name: Upload windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/**/*.{exe,zip}

      - name: Create GitHub Release (windows)
        uses: ncipollo/release-action@v2
        with:
          artifacts: dist/**/*.{exe,zip}
          tag: ${{ github.ref_name }}