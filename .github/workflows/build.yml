name: Build CRM Electron App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      # 1️⃣ 拉取代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ 安装依赖
      - name: Install dependencies
        run: npm install

      # 4️⃣ 获取 package.json 版本号
      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_ENV

      # 5️⃣ 打包应用
      - name: Build Electron app
        run: npm run dist

      # 6️⃣ 上传安装包到 Artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: release-files
          path: |
            dist/*.dmg
            dist/mac-*/**/*.dmg
            dist/*.exe
            dist/win-*/**/*.exe

      # 7️⃣ 创建 GitHub Release（使用 package.json 的版本号）
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.version }}
          name: v${{ env.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 8️⃣ 上传安装包到 Release
      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.dmg
            dist/mac-*/**/*.dmg
            dist/*.exe
            dist/win-*/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}